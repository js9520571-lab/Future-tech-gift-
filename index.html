<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Hub</title>
    <style>
        /* This is the SCSS converted to standard CSS */
        body {
            background: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-container {
            border: 1px solid #00ffcc;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffcc;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #00ffcc; }
        ul { line-height: 1.8; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Global AI Hub</h1>
    <p>Helping the world find the right AI systems.</p>

    <div class="card-container">
        <h3>🚀 Featured AI Systems</h3>
        <ul>
            <li><strong>ChatGPT:</strong> Best for writing and coding.</li>
            <li><strong>Midjourney:</strong> Best for high-end digital art.</li>
            <li><strong>Astro:</strong> The tool that makes web building fast.</li>
            <li><strong>ElevenLabs:</strong> Best for realistic AI voices.</li>
        </ul>
    </div>
</body>
</html>
